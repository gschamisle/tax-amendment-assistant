name: Offline tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run offline test suite
        run: uv run python -m scripts.run_offline_tests
